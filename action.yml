name: 'Loco Translations'
description: 'Download/export translations from Loco (create PR with changes) or import a local JSON file to Loco.'
inputs:
  locoExportKey:
    description: 'Loco Export Key (required for export mode)'
    required: false
  locoWriteKey:
    description: 'Loco Write/Full-access Key for import mode (https://localise.biz -> Developer tools)'
    required: false
  langs:
    description: 'Languages: comma-separated for export; single language for import (e.g. en)'
    required: true
  format:
    description: 'Format of the translations (required for export mode)'
    required: false
  nofolding:
    description: 'Do not fold the JSON translations'
    required: false
    default: 'false'
  convert:
    description: 'Convert the JSON translations to value format'
    required: false
    default: 'false'
  filesExtension:
    description: 'Files extension'
    required: false
  languagePostfixInNames:
    description: 'Postfix in language names'
    required: false
    default: 'false'
  translationsFolder:
    description: 'Folder where translation files live (export: write downloaded files; import: read <lang>.json from here)'
    required: true
  mainBranch:
    description: 'Main branch'
    required: false
    default: 'main'
  reviewer:
    description: 'Reviewer for the PR'
    required: false
  skip_pr_create:
    description: 'Do not create PR (monorepo support)'
    required: false
    default: 'false'
  use_current_loco_branch:
    description: 'Use loco branch created by previous run (monorepo support)'
    required: false
    default: 'false'
  draft:
    description: 'Create PR as draft'
    required: false
    default: 'false'
  automerge:
    description: 'Automerge PR'
    required: false
    default: 'false'
  app-id:
    description: 'GitHub App ID (required for export mode)'
    required: false
  private-key:
    description: 'GitHub App Private Key (required for export mode)'
    required: false

runs:
  using: "composite"
  steps:
    - name: Determine mode
      id: mode
      run: |
        if [ -n "${{ inputs.locoWriteKey }}" ] && [ "${{ inputs.format }}" = "json" ]; then
          echo "mode=import" >> "$GITHUB_OUTPUT"
        else
          echo "mode=export" >> "$GITHUB_OUTPUT"
        fi
      shell: bash

    - uses: actions/create-github-app-token@v1
      if: steps.mode.outputs.mode == 'export'
      id: app-token
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.private-key }}

    - name: Validate export inputs
      if: steps.mode.outputs.mode == 'export'
      run: |
        if [ -z "${{ inputs.locoExportKey }}" ] || [ -z "${{ inputs.app-id }}" ] || [ -z "${{ inputs.private-key }}" ] || [ -z "${{ inputs.format }}" ]; then
          echo "Export mode requires locoExportKey, app-id, private-key, and format."
          exit 1
        fi
      shell: bash

    - name: Validate import inputs
      if: steps.mode.outputs.mode == 'import'
      id: validate_import
      run: |
        if [ "${{ inputs.format }}" != "json" ]; then
          echo "Import mode only runs when format is json (got: ${{ inputs.format }}). Set format: 'json' to import to Loco."
          exit 1
        fi
        LANGS="${{ inputs.langs }}"
        if [ -z "$LANGS" ]; then
          echo "Import mode requires langs."
          exit 1
        fi
        if echo "$LANGS" | grep -q ','; then
          echo "Import mode requires exactly one language in langs (e.g. en), got: $LANGS"
          exit 1
        fi
        echo "lang=$LANGS" >> "$GITHUB_OUTPUT"
      shell: bash

    - name: Checkout (import mode)
      if: steps.mode.outputs.mode == 'import'
      uses: actions/checkout@v4

    - name: Translations Seed (import to Loco)
      if: steps.mode.outputs.mode == 'import'
      run: ${{ github.action_path }}/scripts/TranslationsSeed.ps1
      env:
        locoWriteKey: ${{ inputs.locoWriteKey }}
        lang: ${{ steps.validate_import.outputs.lang }}
        sourceFile: ${{ github.workspace }}/${{ inputs.translationsFolder }}/${{ steps.validate_import.outputs.lang }}.json
      shell: pwsh

    - name: Get GitHub App User ID
      if: steps.mode.outputs.mode == 'export'
      id: get-user-id
      run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
      shell: bash
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}

    - name: Configure GitHub App User ID
      if: steps.mode.outputs.mode == 'export'
      run: |
        git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
        git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com>'
      shell: bash

    - name: Translations PR Check
      if: steps.mode.outputs.mode == 'export'
      id: pr_check
      run: ${{ github.action_path }}/scripts/TranslationsPRCheck.ps1
      env:
        mainBranch: ${{ inputs.mainBranch }}
        repositoryId: ${{ github.repository }}
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
      shell: pwsh
    
    - name: Checkout to existing translations branch
      if: steps.mode.outputs.mode == 'export' && steps.pr_check.outputs.createPullRequest == 'false'
      uses: actions/checkout@v4
      with:
        ref: ${{ steps.pr_check.outputs.translationsBranch }}
        token: ${{ steps.app-token.outputs.token }}
    
    - name: Checkout to the main branch
      if: steps.mode.outputs.mode == 'export' && steps.pr_check.outputs.createPullRequest == 'true'
      uses: actions/checkout@v4
      with:
        ref: ${{ steps.pr_check.outputs.sourceBranch }}
        token: ${{ steps.app-token.outputs.token }}

    - name: Checkout to new translations branch
      if: steps.mode.outputs.mode == 'export' && inputs.use_current_loco_branch != 'true' && steps.pr_check.outputs.createPullRequest == 'true'
      run: git checkout -b $translationsBranch
      env:
        translationsBranch: ${{ steps.pr_check.outputs.translationsBranch }}
      shell: bash
    
    - name: Checkout to the current translations branch
      if: steps.mode.outputs.mode == 'export' && inputs.use_current_loco_branch == 'true' && steps.pr_check.outputs.createPullRequest == 'true'
      run: git checkout -b $translationsBranch && git pull origin $translationsBranch
      env:
        translationsBranch: ${{ steps.pr_check.outputs.translationsBranch }}
      shell: bash

    - name: Translations Download
      if: steps.mode.outputs.mode == 'export'
      run: ${{ github.action_path }}/scripts/TranslationsDownload.ps1
      env:
        locoExportKey: ${{ inputs.locoExportKey }}
        tmpFolder: ${{ runner.temp }}/tmp_translations
        langs: ${{ inputs.langs }}
        format: ${{ inputs.format }}
        nofolding: ${{ inputs.nofolding }}
        convert: ${{ inputs.convert }}
        filesExtension: ${{ inputs.filesExtension }}
        languagePostfixInNames: ${{ inputs.languagePostfixInNames }}
      shell: pwsh
      
    - name: Translations Apply
      if: steps.mode.outputs.mode == 'export'
      id: translations_check
      run: ${{ github.action_path }}/scripts/TranslationsApply.ps1
      env:
        tmpFolder: ${{ runner.temp }}/tmp_translations
        targetFolder: ${{ github.workspace }}/${{ inputs.translationsFolder }}
      shell: pwsh
      
    - name: Translations Push
      if: steps.mode.outputs.mode == 'export' && steps.translations_check.outputs.changesDetected == 'true'
      run: ${{ github.action_path }}/scripts/TranslationsPush.ps1
      env:
        sourceBranch: ${{ steps.pr_check.outputs.sourceBranch }}
        translationsBranch: ${{ steps.pr_check.outputs.translationsBranch }}
        changesDetected: ${{ steps.translations_check.outputs.changesDetected }}
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
      shell: pwsh
      
    - name: Translations PR Create
      if: steps.mode.outputs.mode == 'export' && inputs.skip_pr_create != 'true' && steps.pr_check.outputs.createPullRequest == 'true' && steps.translations_check.outputs.changesDetected == 'true'
      run: ${{ github.action_path }}/scripts/TranslationsPRCreate.ps1
      env:
        sourceBranch: ${{ steps.pr_check.outputs.sourceBranch }}
        translationsBranch: ${{ steps.pr_check.outputs.translationsBranch }}
        createPullRequest: ${{ steps.pr_check.outputs.createPullRequest }}
        repositoryId: ${{ github.repository }}
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
        reviewer: ${{ inputs.reviewer }}
        draft: ${{ inputs.draft }}
        automerge: ${{ inputs.automerge }}
      shell: pwsh

    - name: Cleanup
      if: always() && steps.mode.outputs.mode == 'export'
      run: ${{ github.action_path }}/scripts/FolderCleanup.ps1
      env:
        folderPath: ${{ github.workspace }}
      shell: pwsh
